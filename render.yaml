services:
  - type: web
    name: community-research-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    envVars:
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: REDDIT_USER_AGENT
        sync: false

  - type: web
    name: community-research-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python mcp_server.py
    envVars:
      - key: COMMUNITY_RESEARCH_API_URL
        value: https://community-research-api.onrender.com
      - key: MCP_API_TIMEOUT_SECONDS
        value: 20
      - key: MCP_API_RETRY_ATTEMPTS
        value: 3
      - key: MCP_API_RETRY_BACKOFF_SECONDS
        value: 0.5

  - type: web
    name: community-research-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://community-research-api.onrender.com